services:
  # ── Backend: Node.js / Express API ──────────────────────────────────────────
  - type: web
    name: bodax-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # You will paste this in the Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: CLIENT_URL
        sync: false          # You will paste the Static Site URL here after it deploys

  # ── Frontend: React + Vite static site ──────────────────────────────────────
  - type: web
    name: bodax-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # You will paste the bodax-api URL here (e.g. https://bodax-api.onrender.com)
